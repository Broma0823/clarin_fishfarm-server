; Upload/monitor port: Linux (Raspberry Pi + CH340) → /dev/ttyUSB0; CP210x often /dev/ttyACM0.
; Windows: use e.g. COM3 — set upload_port here or run:
;   pio run -t upload --upload-port COM3
[env:lilygo_esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
upload_speed = 115200
upload_flags =
  --before=default_reset
  --after=hard_reset

lib_deps =
  paulstoffregen/OneWire@^2.3.8
  milesburton/DallasTemperature@^3.11.0

; Monitoring POST — Pi Wi‑Fi only (same radio path as ESP32; do not use Ethernet IP here).
build_flags =
  -D CORE_DEBUG_LEVEL=0
  -DFISHFARM_API_URL='"http://192.168.1.20:4000/api/monitoring"'
  ; DO calibration defaults (override as needed)
  ; -DDO_CAL1_V_MV=735
  ; -DDO_CAL1_T_C=26
  ; -DDO_TWO_POINT_CALIBRATION=0
  ; -DDO_FALLBACK_TEMP_C=25
